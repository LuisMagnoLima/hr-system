<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="login-container">
  <h1>HR System</h1>
  <p class="subtitle">Entre com suas credenciais</p>

  <div class="input-group">
    <span>📧</span>
    <input type="text" id="email" placeholder="Email address">
  </div>

  <div class="input-group">
    <span>🔒</span>
    <input type="password" id="senha" placeholder="Password">
  </div>

  <button class="login-btn" onclick="login()">Entrar</button>

  <p class="forgot">Esqueceu a senha?</p>
</div>

<script src="js/auth.js"></script>
</body>
</html>
