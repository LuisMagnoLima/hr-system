<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Ofício</title>
  <link rel="stylesheet" href="css/solicitacao.css">
</head>
<body>
  <main class="sol-page">
    <section class="sol-container">
      <header class="sol-header">
        <button class="sol-back-btn" type="button" onclick="voltar()">← Voltar</button>
        <div>
          <h1>Registro de Ofício</h1>
          <p>
            Informe apenas o número do ofício. As demais informações
            permanecerão no documento físico.
          </p>
        </div>
      </header>

      <form id="formSolicitacao" novalidate>
        <label class="sol-label" for="numeroOficio">Número do ofício *</label>
        <input
          type="text"
          id="numeroOficio"
          class="sol-input"
          placeholder="Ex.: 123/2026"
          maxlength="100"
          autocomplete="off"
          required
        >

        <button id="btnEnviar" class="sol-send-btn" type="submit">
          Gerar protocolo
        </button>
      </form>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/solicitacao.js"></script>
</body>
</html>
