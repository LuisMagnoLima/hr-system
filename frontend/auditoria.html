<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Auditoria</title>
  <link rel="stylesheet" href="css/auditoria.css">
</head>
<body>

<div class="auditoria-container">
  <div class="auditoria-topo">
    <button class="btn-voltar" onclick="voltarBanco()">← Voltar</button>
    <h1>📊 Auditoria do Sistema</h1>
  </div>

  <div class="auditoria-resumo">
    <div class="resumo-card">
      <span class="resumo-titulo">Total de registros</span>
      <strong id="totalRegistros">0</strong>
    </div>

    <div class="resumo-card">
      <span class="resumo-titulo">Último usuário</span>
      <strong id="ultimoUsuario">-</strong>
    </div>

    <div class="resumo-card">
      <span class="resumo-titulo">Última ação</span>
      <strong id="ultimaAcao">-</strong>
    </div>
  </div>

  <div class="filtros">
    <input type="text" id="filtroUsuario" placeholder="Filtrar por usuário">

    <select id="filtroAcao">
      <option value="">Todas as ações</option>
<option value="login_sucesso">Login com sucesso</option>
<option value="login_falhou">Falha no login</option>
<option value="logout">Logout</option>

<option value="upload_documento">Upload de documento</option>
<option value="upload_financeiro">Upload financeiro</option>
<option value="visualizar_documento">Visualização de documento</option>
<option value="editar_documento_financeiro">Edição pelo financeiro</option>
<option value="confirmar_documento_financeiro">Confirmado pelo financeiro</option>
<option value="desconfirmar_documento_financeiro">Confirmação removida</option>
<option value="delete_documento_financeiro">Exclusão pelo financeiro</option>

<option value="criar_solicitacao">Criação de solicitação</option>
<option value="processar_solicitacao">Processamento de solicitação</option>

<option value="arquivar_documento">Arquivamento automático</option>
<option value="restaurar_arquivamento">Restauração de arquivado</option>
<option value="excluir_arquivamento_definitivo">Exclusão definitiva</option>

<option value="admin_criar_usuario">Criação de usuário</option>
<option value="admin_editar_usuario">Edição de usuário</option>
<option value="admin_alterar_senha_usuario">Alteração de senha</option>
<option value="admin_excluir_usuario">Exclusão de usuário</option>

<option value="tentativa_acesso_negado">Tentativa de acesso negado</option>
    </select>

    <input type="date" id="filtroData">

    <button onclick="carregarAuditoria()">Buscar</button>
    <button class="btn-limpar" onclick="limparFiltros()">Limpar</button>
  </div>

  <div id="lista"></div>
</div>
<script src="js/api.js"></script>
<script src="js/auditoria.js"></script>
</body>
</html>
