<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Protocolos</title>
  <link rel="stylesheet" href="css/controle_protocolos.css">
</head>
<body>
  <main class="cp-page">
    <section class="cp-container">
      <header class="cp-header">
        <div>
          <button class="cp-back" type="button" onclick="window.location.href='menu.html'">← Voltar</button>
          <h1>Controle de Protocolos</h1>
          <p>Registro dos números de ofícios recebidos fisicamente.</p>
        </div>
        <button class="cp-export" id="btnExportar" type="button">Exportar CSV</button>
      </header>

      <section class="cp-cards">
        <article class="cp-card">
          <strong id="cardTotal">0</strong>
          <span>Total de protocolos</span>
        </article>
      </section>

      <section class="cp-filtros">
        <input id="fProtocolo" placeholder="Protocolo">
        <input id="fOficio" placeholder="Número do ofício">
        <label>De <input id="fDataInicial" type="date"></label>
        <label>Até <input id="fDataFinal" type="date"></label>
        <div class="cp-filter-actions">
          <button id="btnFiltrar" type="button">Aplicar filtros</button>
          <button id="btnLimpar" class="secondary" type="button">Limpar</button>
        </div>
      </section>

      <div id="cpMensagem" class="cp-message">Carregando protocolos...</div>

      <div class="cp-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Protocolo</th>
              <th>Nº do ofício</th>
              <th>Cadastrado por</th>
              <th>Data/Hora</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="cpTabela"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>

<script src="js/api.js"></script>
<script src="js/controle_protocolos.js"></script>
</html>
