<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretarias</title>
  <link rel="stylesheet" href="css/secretarias.css">
</head>
<body>
  <div class="sec-page">
    <aside class="sec-sidebar">
      <h2>HR System</h2>
      <p>Administração</p>
      <button onclick="window.location.href='menu.html'">← Voltar ao menu</button>
    </aside>

    <main class="sec-main">
      <div class="sec-header">
        <div>
          <h1>Secretarias</h1>
          <p>Cadastre e controle as secretarias disponíveis no sistema.</p>
        </div>
        <button class="primary" onclick="abrirModal()">+ Nova secretaria</button>
      </div>

      <div class="sec-toolbar">
        <input id="busca" type="search" placeholder="Buscar por sigla ou nome..." oninput="renderizar()">
        <select id="filtroStatus" onchange="renderizar()">
          <option value="todas">Todas</option>
          <option value="ativas">Ativas</option>
          <option value="inativas">Inativas</option>
        </select>
      </div>

      <div class="sec-table-wrap">
        <table>
          <thead>
            <tr><th>Sigla</th><th>Nome</th><th>Status</th><th>Ações</th></tr>
          </thead>
          <tbody id="secretariasBody"></tbody>
        </table>
      </div>
      <p id="estadoVazio" class="empty" hidden>Nenhuma secretaria encontrada.</p>
    </main>
  </div>

  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitulo">Nova secretaria</h2>
        <button class="icon" onclick="fecharModal()">×</button>
      </div>
      <input id="secretariaId" type="hidden">
      <label>Sigla</label>
      <input id="sigla" maxlength="20" placeholder="Ex.: SAF">
      <label>Nome completo</label>
      <input id="nome" maxlength="150" placeholder="Nome da secretaria">
      <label class="check"><input id="ativa" type="checkbox" checked> Secretaria ativa</label>
      <div class="modal-actions">
        <button onclick="fecharModal()">Cancelar</button>
        <button class="primary" onclick="salvarSecretaria()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/secretarias.js"></script>
</body>
</html>
