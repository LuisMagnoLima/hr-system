<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Financeiro</title>
  <link rel="stylesheet" href="css/financeiro.css">

</head>

<body>

<div class="financeiro-page">

  <div class="financeiro-top-actions">
    <button class="btn-voltar-login" onclick="voltarLogin()">← Voltar para Login</button>
  </div>
  
  <h1 class="financeiro-titulo">📅 Calendário Financeiro</h1>

  <div class="financeiro-filtros">
    <select id="filtroDepartamento" onchange="setFiltroDepartamento()">
      <option value="">Todas as secretarias</option>
      <option value="AGERP">AGERP</option>
      <option value="ITERMA">ITERMA</option>
      <option value="SAFE">SAFE</option>
      <option value="SEDES">SEDES</option>
      <option value="SEGOV">SEGOV</option>
    </select>

    <button onclick="abrirModalCriar()">+ Criar</button>
  </div>

  <div class="financeiro-resumo">

    <div class="resumo-card resumo-geral">
        <span>🌎 Total Geral</span>
        <strong id="resumoTotalGeral">0</strong>
        <small>Todos os documentos</small>
    </div>

    <div class="resumo-card resumo-mes">
        <span>📅 Total do Mês</span>
        <strong id="resumoTotalMes">0</strong>
        <small id="resumoPeriodo">Mês Atual</small>
    </div>

    <div class="resumo-card resumo-pendente">
        <span>⏳ Pendentes do Mês</span>
        <strong id="resumoPendentes">0</strong>
        <small>Aguardando confirmação</small>
    </div>

    <div class="resumo-card resumo-confirmado">
        <span>✅ Confirmados do Mês</span>
        <strong id="resumoConfirmados">0</strong>
        <small>Financeiro</small>
    </div>

</div>

<div class="financeiro-busca">
  <input
    type="text"
    id="buscaFinanceiro"
    placeholder="Buscar por nome, secretaria ou usuário..."
    oninput="renderCalendario()"
  >
</div>

  <div class="financeiro-header">
    <button onclick="mesAnterior()">◀</button>
    <h2 id="mesAno"></h2>
    <button onclick="proximoMes()">▶</button>
  </div>

  <div id="calendario"></div>

</div>



<div id="modal" class="financeiro-modal">
  <div class="financeiro-modal-content">
    <span onclick="fecharModal()" class="financeiro-close">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<div id="modalCriar" class="financeiro-modal">
  <div class="financeiro-modal-content">
    <span onclick="fecharModalCriar()" class="financeiro-close">&times;</span>

    <h3>Adicionar Documento Financeiro</h3>

    <input id="finNome" placeholder="Nome do documento">
    <input id="finEmbalagem" placeholder="Armazenamento / Embalagem">

    <select id="finDepartamento">
      <option value="AGERP">AGERP</option>
      <option value="ITERMA">ITERMA</option>
      <option value="SAFE">SAFE</option>
      <option value="SEDES">SEDES</option>
      <option value="SEGOV">SEGOV</option>
    </select>

    <select id="finModulo">
      <option value="notas">Notas</option>
      <option value="diarias">Diárias</option>
      <option value="admissoes">Admissão/Demissão</option>
    </select>

    <select id="finTipo">
      <option value="ativo">Ativo</option>
      <option value="inativo">Inativo</option>
      <option value="regional">Regional</option>
    </select>

    <input type="file" id="finFile" accept="application/pdf">

    <button onclick="uploadFinanceiro()">Salvar</button>
  </div>
</div>

<div id="modalEditar" class="financeiro-modal">
  <div class="financeiro-modal-content">
    <span onclick="fecharModalEditar()" class="financeiro-close">&times;</span>

    <h3>Editar Documento</h3>

    <input type="hidden" id="editId">

    <input id="editNome" placeholder="Nome do documento">
    <input id="editEmbalagem" placeholder="Armazenamento / Embalagem">

    <select id="editDepartamento">
      <option value="AGERP">AGERP</option>
      <option value="ITERMA">ITERMA</option>
      <option value="SAFE">SAFE</option>
      <option value="SEDES">SEDES</option>
      <option value="SEGOV">SEGOV</option>
    </select>

    <select id="editModulo">
      <option value="notas">Notas</option>
      <option value="diarias">Diárias</option>
      <option value="admissoes">Admissão/Demissão</option>
    </select>

    <select id="editTipo">
      <option value="ativo">Ativo</option>
      <option value="inativo">Inativo</option>
      <option value="regional">Regional</option>
    </select>

    <button onclick="salvarEdicao()">Salvar edição</button>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/financeiro.js"></script>

</body>
</html>
