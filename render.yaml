services:
  - type: web
    name: hr-system-inagro
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: hr-system
      - key: MAX_FILE_SIZE
        value: "1073741824"
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: COOKIE_NAME
        value: hr_session
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: Lax
      - key: TOKEN_HOURS
        value: "8"
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: ALLOWED_ORIGINS
        value: https://hr-system-inagro.onrender.com
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: "5000"
      - key: MONGO_CONNECT_TIMEOUT_MS
        value: "5000"
      - key: MONGO_SOCKET_TIMEOUT_MS
        value: "20000"
      - key: MONGO_MIN_POOL_SIZE
        value: "1"
      - key: MONGO_MAX_POOL_SIZE
        value: "50"
